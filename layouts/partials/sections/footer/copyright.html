<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-4 text-center">
            {{ if or .Site.Params.navbar.brandLogo .Site.Params.favicon }}
                <div class="pb-2">
                    <a href="{{ "" | absURL }}" title="{{ .Site.Title }}">
                        <img alt="Footer logo" src="{{ (.Site.Params.navbar.brandLogo | default .Site.Params.favicon) | strings.TrimPrefix "/" | absURL }}"
                            height="40px" width="40px">
                    </a>
                </div>
            {{ end }}
            &copy; {{ now.Format "2006"}} {{ .Site.Params.copyright }} {{ .Site.Params.terms.copyright | default (i18n "copyright") }}
            <div class="text-secondary">
                Built with
                <a href="https://github.com/gurusabarish/hugo-profile" target="_blank"
                    title="Hugo Profile theme">
                    Hugo Profile
                </a>.
            </div>
        </div>
    </div>
</div>
