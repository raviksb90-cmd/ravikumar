  about:
    enable: true
    title: "Profile"
    image: ""
    content: |-
      I am a full-stack web developer based in Una, Himachal Pradesh, India. My work spans SaaS platforms, admin systems, restaurant and clinic tools, school-management modules, survey products, booking systems, real-time applications, payment-enabled products, and Electron desktop/kiosk applications.

      I am strongest in roles that need practical end-to-end delivery: translating requirements into product features, building interfaces and APIs, integrating third-party systems, stabilizing production workflows, and improving existing applications across modern JavaScript and legacy PHP/MVC stacks.
    skills:
      enable: true
      title: "Current technical strengths:"
      items:
        - "Frontend: React.js, Next.js, Redux, React Native, Angular, Vue.js, Tailwind CSS, Bootstrap, Material UI, HTML5, CSS3, JavaScript"
        - "Backend: Node.js, Express.js, PHP, Laravel, YII, Slim, CodeIgniter, REST APIs"
        - "Databases and cloud: MySQL, MongoDB, PostgreSQL, Firebase, AWS, DigitalOcean, Google Cloud"
        - "Integrations: Stripe, PayPal, Authorize.Net, QuickBooks, Dropbox, Gmail API, Twilio, SendGrid, SSO"
        - "Desktop and real-time: Electron.js, WebRTC, Socket.io, Linux ARM builds, Windows builds, electron-builder"
        - "AI and productivity: OpenAI API, Segmind API, Cursor, Claude, OpenAI/ChatGPT, AI-assisted coding, debugging, refactoring, documentation, and implementation planning"

